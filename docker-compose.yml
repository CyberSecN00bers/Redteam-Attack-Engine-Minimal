services:
  agent:
    image: hnquangit/redteam-attack-engine:latest
    container_name: cyberrange-dast-agent
    env_file:
      - .env
    environment:
      TARGET_URL: ${TARGET_URL:-http://127.0.0.1:80}
      HOST_HEADER: ${HOST_HEADER:-vulnerable.cyberrange.local}
      ATTACK_PROFILE: ${ATTACK_PROFILE:-stealth}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-waf_payloads}
    command:
      - python
      - main.py
      - --target-url
      - ${TARGET_URL:-http://127.0.0.1:80}
      - --host-header
      - ${HOST_HEADER:-vulnerable.cyberrange.local}
      - --attack-profile
      - ${ATTACK_PROFILE:-stealth}
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  qdrant_data:
